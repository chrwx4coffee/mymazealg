<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Visualization</title>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        
        <aside class="control-panel glass">
            <div class="panel-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                <h1>Maze UI Gen</h1>
            </div>
            
            <p class="subtitle">Dynamic path visualization using the core solution algorithm.</p>
            
            <div class="input-group">
                <label for="grid-size">Grid Size (X)</label>
                <div class="slider-container">
                    <input type="range" id="grid-size" min="5" max="50" value="15">
                    <span id="grid-size-val" class="val-display">15</span>
                </div>
            </div>

            <div class="input-group">
                <label for="max-step">Max Step Limit</label>
                <div class="slider-container">
                    <input type="range" id="max-step" min="1" max="10" value="3">
                    <span id="max-step-val" class="val-display">3</span>
                </div>
            </div>

            <button id="generate-btn" class="btn primary-btn">
                <span>Generate Path</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>

            <div class="stats glass-inner">
                <div class="stat-row">
                    <span>Steps Taken</span>
                    <strong id="stat-steps">0</strong>
                </div>
                <div class="stat-row">
                    <span>Grid Dimension</span>
                    <strong id="stat-dim">0x0</strong>
                </div>
            </div>
        </aside>

        <section class="visualization-area glass">
            <div id="grid-container" class="grid-container">
                <!-- SVG lines will be rendered here -->
                <svg id="path-svg" xmlns="http://www.w3.org/2000/svg">
                    <g id="bg-grid-lines" stroke="rgba(255,255,255,0.08)" stroke-width="1"></g>
                    <g id="walls-group" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"></g>
                    <path id="maze-path" d="" fill="none" stroke="#EC4899" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <div id="nodes-container"></div>
            </div>
        </section>

    </main>

    <script src="app.js?v=2"></script>
</body>
</html>
